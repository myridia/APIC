name: Windows
on:
  push:
    branches: ["main"]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write 
  issues: read
  packages: none

jobs:
  Build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          dotnet publish apic/apic.csproj -c Release -r  win-x64 /p:PublishSingleFile=true /p:PublishTrimmed=true
          dir apic/bin/Release/net10.0/win-x64/publish/
      - name: Release
        if: github.repository_owner == 'myridia'                  
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 'apic/bin/Release/net10.0/win-x64/publish/apic.exe'
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true


          

          


    
   


        


        


 
     
